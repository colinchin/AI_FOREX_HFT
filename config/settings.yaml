# Trading System Configuration
environment: practice  # practice | live

oanda:
  practice_url: "https://api-fxpractice.oanda.com"
  live_url: "https://api-fxtrade.oanda.com"
  stream_practice_url: "https://stream-fxpractice.oanda.com"
  stream_live_url: "https://stream-fxtrade.oanda.com"

instruments:
  # 90-day OOS paper-trade for the broker-cost experiment (2026-05-23).
  # Only GBP_NZD enabled, locked to settings.yaml defaults (bb_std=2.0,
  # rsi 35/65, sl_multiplier=2.5). GBP_NZD's previous pair_params override
  # was removed so the locked defaults apply.
  # Revert to the 11-pair production list after the 90-day window closes.
  # Prior 11-pair list (commented for easy revert):
  #   EUR_USD, USD_JPY, GBP_USD, USD_CHF, AUD_USD, NZD_USD,
  #   EUR_GBP, EUR_JPY, EUR_CHF, GBP_AUD, NZD_CAD
  - GBP_NZD

granularities:
  fast: M1
  signal: M5
  trend: H1
  swing: H4

strategy:
  primary: mean_reversion
  # secondary disabled — backtest PF 0.88 (losing), generated 33 trades/day of churn
  # secondary: momentum_scalp

  momentum_scalp:
    ema_fast: 9
    ema_slow: 20
    rsi_period: 14
    rsi_upper: 70
    rsi_lower: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    atr_period: 14
    tp_atr_mult: 3.0
    sl_atr_mult: 2.0
    trailing_activate_atr: 2.0
    trailing_distance_atr: 1.0
    max_trade_duration_minutes: 45
    min_candle_body_pips: 2.0
    min_ema_separation_pips: 1.5
    signal_cooldown_candles: 6

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_oversold: 35
    rsi_overbought: 65
    atr_period: 14
    sl_multiplier: 2.5
    # max_trade_duration_minutes: disabled — backtest shows no-exit PF 1.217 vs 120min PF 1.128
    # Longer trades hit TP with avg +$8.22/win; early exit captures less. Code remains in main.py.
    pair_params_file: "config/pair_params.yaml"  # per-pair optimized overrides

sessions:
  # Times in UTC
  tokyo:
    start: "00:00"
    end: "09:00"
  london:
    start: "08:00"
    end: "17:00"
  new_york:
    start: "13:00"
    end: "22:00"
  overlap:
    start: "13:00"
    end: "17:00"

  # Only trade during these sessions
  active_sessions:
    - london
    - new_york
    - overlap

  # News blackouts now handled by dynamic news_filter in risk.yaml
  # (fetches ForexFactory calendar automatically)

data:
  tick_buffer_size: 10000
  candle_cache_minutes: 1440  # 24 hours of M1 candles
  history_dir: "data/history"
  parquet_dir: "data/parquet"

logging:
  level: INFO
  format: json
  file: "logs/trading.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

monitoring:
  status_interval_seconds: 60
  health_check_interval_seconds: 30
  stream_chunk_size: 20  # Max instruments per OANDA stream connection
